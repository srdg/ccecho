name: Release

on:
  push:
    tags:
      - 'v*'

env:
  BUILD_TYPE: Release

jobs:
  Build-and-upload:
    name: Build and Upload
    runs-on: windows-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}
    
    - name: Upload
      uses: actions/upload-artifact@v4
      id: upload_server
      with:
        name: ccecho-${{github.ref_name}}.exe
        path: ${{github.workspace}}\.bin\${{env.BUILD_TYPE}}\ccecho.exe
  
  Release:
    name: Create GitHub Release
    needs: Build-and-upload
    runs-on: windows-latest
    env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
    - name: Download
      uses: actions/download-artifact@v4
      with:
         name: ccecho-${{github.ref_name}}.exe
         run-id: upload_server
         path: bin
    
    - name: Display artifactory
      run: ls -R bin
    

    - name: Create Release
      uses: ncipollo/release-action@v1
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        body: |
            Automated release of echoserver `${{github.ref_name}}`.
        artifacts: "bin/ccecho.*"
        prerelease: true
        tag: ${{github.ref}}
    